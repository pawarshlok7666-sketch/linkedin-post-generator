<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI LinkedIn Post Generator</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:40px 20px;
        }

        .container{
            width:100%;
            max-width:900px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        h1{
            margin-bottom:25px;
            color:#222;
            font-size:42px;
        }

        textarea{
            width:100%;
            height:180px;
            padding:15px;
            font-size:18px;
            border:1px solid #ccc;
            border-radius:10px;
            resize:none;
            margin-bottom:20px;
        }

        select{
            width:100%;
            padding:15px;
            font-size:18px;
            border:1px solid #ccc;
            border-radius:10px;
            margin-bottom:20px;
            background:white;
        }

        button{
            background:#0077b5;
            color:white;
            border:none;
            padding:14px 28px;
            font-size:18px;
            border-radius:10px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#005f91;
        }

        .output{
            margin-top:35px;
            background:#eef4f8;
            padding:30px;
            border-radius:12px;
        }

        .output h2{
            margin-bottom:20px;
            color:#222;
        }

        .post-content{
            white-space:pre-wrap;
            line-height:1.8;
            font-size:18px;
            color:#333;
        }

        .copy-btn{
            margin-top:25px;
            background:green;
            padding:10px 22px;
            font-size:16px;
            border-radius:8px;
        }

        .copy-btn:hover{
            background:darkgreen;
        }

        .loading{
            margin-top:15px;
            color:#0077b5;
            font-weight:bold;
            display:none;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>AI LinkedIn Post Generator</h1>

        <form method="POST" onsubmit="showLoading()">

            <textarea
                name="topic"
                placeholder="Enter your LinkedIn post topic..."
                required
            ></textarea>

            <select name="tone" required>

                <option value="">Select Tone</option>

                <option value="Professional">Professional</option>

                <option value="Casual">Casual</option>

                <option value="Motivational">Motivational</option>

                <option value="Storytelling">Storytelling</option>

            </select>

            <button type="submit">
                Generate Post
            </button>

            <div class="loading" id="loadingText">
                Generating post...
            </div>

        </form>

        {% if generated_post %}

        <div class="output">

            <h2>Generated LinkedIn Post</h2>

            <div class="post-content" id="postText">
                {{ generated_post }}
            </div>

            <button class="copy-btn" onclick="copyPost()">
                Copy Post
            </button>

        </div>

        {% endif %}

    </div>

    <script>

        function copyPost(){

            const text =
                document.getElementById("postText").innerText;

            navigator.clipboard.writeText(text);

            alert("Post copied successfully!");

        }

        function showLoading(){

            document.getElementById("loadingText").style.display = "block";

        }

    </script>

</body>
</html>
